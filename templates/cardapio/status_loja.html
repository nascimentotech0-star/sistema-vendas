<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Status da Loja — Açaídeira 77</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Poppins',sans-serif;
      background:#0e0718;
      color:#f0ebff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
    }

    .logo{font-size:3rem;margin-bottom:.5rem}
    .marca{font-size:1.1rem;font-weight:700;color:#9d4edd;margin-bottom:2rem}

    /* STATUS ATUAL */
    .status-atual{
      display:flex;
      align-items:center;
      gap:.75rem;
      font-size:1.1rem;
      font-weight:700;
      padding:.75rem 2rem;
      border-radius:99px;
      margin-bottom:2.5rem;
      transition:all .3s;
    }
    .status-atual.aberta{
      background:rgba(74,222,128,.12);
      border:2px solid rgba(74,222,128,.4);
      color:#86efac;
    }
    .status-atual.fechada{
      background:rgba(248,113,113,.1);
      border:2px solid rgba(248,113,113,.3);
      color:#fca5a5;
    }
    .status-dot{
      width:14px;height:14px;border-radius:50%;flex-shrink:0;
    }
    .status-dot.aberta{
      background:#4ade80;
      box-shadow:0 0 8px #4ade80;
      animation:pulse-green 1.5s infinite;
    }
    .status-dot.fechada{background:#6b7280}
    @keyframes pulse-green{
      0%,100%{box-shadow:0 0 4px #4ade80}
      50%{box-shadow:0 0 14px #4ade80}
    }

    /* BOTÃO PRINCIPAL */
    .btn-toggle{
      width:260px;height:260px;
      border-radius:50%;
      border:none;
      cursor:pointer;
      font-family:'Poppins',sans-serif;
      font-size:1.3rem;
      font-weight:800;
      letter-spacing:.02em;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:.5rem;
      transition:all .25s;
      position:relative;
      overflow:hidden;
    }
    .btn-toggle.abrir{
      background:linear-gradient(135deg,#16a34a,#4ade80);
      box-shadow:0 8px 40px rgba(74,222,128,.4);
      color:#fff;
    }
    .btn-toggle.abrir:hover{
      transform:scale(1.05);
      box-shadow:0 12px 50px rgba(74,222,128,.6);
    }
    .btn-toggle.fechar{
      background:linear-gradient(135deg,#dc2626,#f87171);
      box-shadow:0 8px 40px rgba(248,113,113,.4);
      color:#fff;
    }
    .btn-toggle.fechar:hover{
      transform:scale(1.05);
      box-shadow:0 12px 50px rgba(248,113,113,.6);
    }
    .btn-toggle:active{transform:scale(.96)}
    .btn-toggle .btn-icon{font-size:3.5rem;line-height:1}
    .btn-toggle .btn-label{font-size:1.4rem}
    .btn-toggle .btn-sub{font-size:.75rem;opacity:.8;font-weight:500}

    /* HORÁRIO */
    .horario{
      margin-top:2rem;
      font-size:.82rem;
      color:#6b7280;
      text-align:center;
    }
    .horario strong{color:#9ca3af}

    /* FLASH */
    .flash{
      position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);
      padding:.7rem 1.5rem;border-radius:12px;font-size:.9rem;font-weight:600;
      z-index:999;animation:slideDown .3s ease;white-space:nowrap;
    }
    .flash.success{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.4);color:#86efac}
    .flash.warning{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);color:#fcd34d}
    @keyframes slideDown{from{opacity:0;top:0}to{opacity:1;top:1.5rem}}

    /* LINK VOLTAR */
    .link-admin{
      margin-top:2.5rem;
      font-size:.75rem;
      color:#4b5563;
      text-decoration:none;
    }
    .link-admin:hover{color:#9ca3af}

    /* loading overlay */
    .loading-overlay{
      display:none;
      position:fixed;inset:0;
      background:rgba(14,7,24,.7);
      align-items:center;justify-content:center;
      z-index:100;font-size:2rem;
    }
  </style>
</head>
<body>

<div class="logo">🫐</div>
<div class="marca">Açaídeira 77</div>

<div class="status-atual {{ 'aberta' if g.loja_aberta else 'fechada' }}" id="statusBadge">
  <div class="status-dot {{ 'aberta' if g.loja_aberta else 'fechada' }}" id="statusDot"></div>
  <span id="statusTexto">{{ 'Loja Aberta' if g.loja_aberta else 'Loja Fechada' }}</span>
</div>

<button class="btn-toggle {{ 'fechar' if g.loja_aberta else 'abrir' }}"
        id="btnToggle" onclick="toggleLoja()">
  <span class="btn-icon" id="btnIcon">{{ '🔓' if g.loja_aberta else '🔒' }}</span>
  <span class="btn-label" id="btnLabel">{{ 'Fechar Loja' if g.loja_aberta else 'Abrir Loja' }}</span>
  <span class="btn-sub" id="btnSub">{{ 'Clique para fechar' if g.loja_aberta else 'Clique para abrir' }}</span>
</button>

<div class="horario">
  Horário de funcionamento:<br>
  <strong>{{ g.horario_abertura }} às {{ g.horario_fechamento }}</strong>
</div>

<a href="{{ url_for('cardapio.gerenciar') }}" class="link-admin">
  ← Ir para o painel completo
</a>

<div class="loading-overlay" id="loading">⏳</div>

<script>
let aberta = {{ 'true' if g.loja_aberta else 'false' }};

async function toggleLoja() {
  document.getElementById('loading').style.display = 'flex';
  try {
    const res = await fetch('{{ url_for("cardapio.toggle_loja") }}', {
      method: 'POST',
      headers: {
        'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content,
        'Accept': 'application/json',
        'X-Requested-With': 'XMLHttpRequest',
      },
    });
    const data = await res.json();
    aberta = data.aberta;
    atualizarUI(aberta);
    mostrarFlash(aberta ? 'Loja aberta com sucesso!' : 'Loja fechada.', aberta ? 'success' : 'warning');
  } catch(e) {
    mostrarFlash('Erro — tente novamente.', 'warning');
  }
  document.getElementById('loading').style.display = 'none';
}

function atualizarUI(aberta) {
  // badge
  const badge = document.getElementById('statusBadge');
  const dot   = document.getElementById('statusDot');
  badge.className = 'status-atual ' + (aberta ? 'aberta' : 'fechada');
  dot.className   = 'status-dot '   + (aberta ? 'aberta' : 'fechada');
  document.getElementById('statusTexto').textContent = aberta ? 'Loja Aberta' : 'Loja Fechada';
  // botão
  const btn = document.getElementById('btnToggle');
  btn.className = 'btn-toggle ' + (aberta ? 'fechar' : 'abrir');
  document.getElementById('btnIcon').textContent  = aberta ? '🔓' : '🔒';
  document.getElementById('btnLabel').textContent = aberta ? 'Fechar Loja' : 'Abrir Loja';
  document.getElementById('btnSub').textContent   = aberta ? 'Clique para fechar' : 'Clique para abrir';
}

function mostrarFlash(msg, tipo) {
  const el = document.createElement('div');
  el.className = 'flash ' + tipo;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
</script>
</body>
</html>
